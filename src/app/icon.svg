<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- 배경 라운드 사각형 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 상단 광택 -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>

  <!-- T 가로 바 -->
  <rect x="7" y="9.5" width="18" height="3" rx="1.5" fill="white"/>
  <!-- T 세로 바 -->
  <rect x="14.5" y="9.5" width="3" height="14" rx="1.5" fill="white"/>

  <!-- 하단 작은 점 강조 (OCR 스캔 느낌) -->
  <circle cx="16" cy="25" r="1.2" fill="rgba(255,255,255,0.5)"/>
</svg>
